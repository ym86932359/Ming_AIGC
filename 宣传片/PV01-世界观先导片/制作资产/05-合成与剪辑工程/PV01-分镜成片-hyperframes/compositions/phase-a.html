<!doctype html>
<html lang="zh-CN">
  <head><meta charset="UTF-8" /></head>
  <body>
    <template>
      <style>
        @font-face { font-family: "PV Sans SC"; src: url("assets/fonts/NotoSansCJKsc-Regular.otf") format("opentype"); font-weight: 400; }
        @font-face { font-family: "PV Sans SC"; src: url("assets/fonts/NotoSansCJKsc-Bold.otf") format("opentype"); font-weight: 700; }
        #root {
          position: absolute;
          inset: 0;
          width: 1920px;
          height: 1080px;
          overflow: hidden;
          background: #211b19;
          color: #d5cdc1;
          font-family: "PV Sans SC", sans-serif;
        }
        .shot { position: absolute; inset: 0; overflow: hidden; background: #211b19; }
        .shot-inner, .visual { position: absolute; inset: 0; overflow: hidden; }
        .visual { transform-origin: 50% 50%; will-change: transform, filter; }
        .board { position: absolute; width: 200%; height: 200%; max-width: none; object-fit: fill; user-select: none; }
        .full-board { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; user-select: none; }
        .q1 { left: 0; top: 0; }
        .q2 { left: -100%; top: 0; }
        .q3 { left: 0; top: -100%; }
        .q4 { left: -100%; top: -100%; }
        .grade { position: absolute; inset: 0; background: linear-gradient(90deg, rgba(12,18,22,.14), transparent 45%, rgba(33,27,25,.12)); pointer-events: none; }
        .vignette { position: absolute; inset: 0; box-shadow: inset 0 0 190px 42px rgba(4,7,9,.58); pointer-events: none; }
        .grain { position: absolute; inset: 0; opacity: .13; mix-blend-mode: soft-light; background-image: repeating-radial-gradient(circle at 17% 23%, rgba(255,255,255,.22) 0 1px, transparent 1px 4px); background-size: 7px 7px; pointer-events: none; }
        .meta { position: absolute; top: 62px; left: 80px; right: 80px; display: flex; justify-content: space-between; align-items: flex-start; font: 400 21px/1.2 "IBM Plex Mono", "SFMono-Regular", monospace; letter-spacing: .12em; color: #eee6da; text-shadow: 0 2px 14px rgba(0,0,0,.9); }
        .meta > span { padding: 9px 12px; background: rgba(10,10,10,.7); }
        .meta strong { color: #8dc5cc; font-weight: 500; }
        .lens { text-align: right; color: #ddd5ca; }
        .caption { position: absolute; left: 108px; right: 108px; bottom: 82px; display: flex; justify-content: center; pointer-events: none; }
        .caption-panel { max-width: 1470px; padding: 17px 30px 19px 27px; border-left: 4px solid #b9793a; background: linear-gradient(90deg, rgba(26,20,18,.86), rgba(26,20,18,.48) 76%, transparent); text-shadow: 0 2px 18px #000; }
        .speaker { display: block; margin-bottom: 7px; font: 400 17px/1 "IBM Plex Mono", "SFMono-Regular", monospace; letter-spacing: .18em; color: #b9793a; }
        .dialogue { margin: 0; font-size: 49px; line-height: 1.28; font-weight: 700; letter-spacing: .035em; color: #eee6da; }
        .frame-line { position: absolute; inset: 38px; border: 1px solid rgba(213,205,193,.16); pointer-events: none; }
        .frame-line::before, .frame-line::after { content: ""; position: absolute; width: 72px; height: 2px; background: #59aab4; opacity: .55; }
        .frame-line::before { left: -1px; top: -1px; }
        .frame-line::after { right: -1px; bottom: -1px; }
        .phase-tag { position: absolute; right: 79px; bottom: 49px; padding: 6px 9px; background: rgba(10,10,10,.72); font: 400 16px/1 "IBM Plex Mono", monospace; letter-spacing: .16em; color: #eee6da; }
        .progress { position: absolute; left: 80px; right: 80px; bottom: 44px; height: 2px; background: rgba(213,205,193,.14); overflow: hidden; }
        .progress-fill { width: 0; height: 100%; background: #59aab4; box-shadow: 0 0 11px rgba(89,170,180,.62); }
        .ink { position: absolute; inset: 0; background: #151211; opacity: 0; pointer-events: none; }
      </style>

      <div id="root" data-composition-id="phase-a" data-width="1920" data-height="1080" data-duration="18">
        <section id="a-s01" class="clip shot" data-start="0" data-duration="2.999" data-track-index="1">
          <div class="shot-inner">
            <div class="visual"><img class="full-board" src="assets/world/PV01-WK02-旧城区高架生活网络-v01.png" alt="雨夜旧城区高架生活网络，不出现酒馆入口" /></div>
            <div class="grade"></div><div class="vignette"></div><div class="grain"></div>
            <div class="meta"><span><strong>PV01 / S01</strong> · 00:00:00</span><span class="lens">24MM · LOW ANGLE<br />RAIN / EXTERIOR</span></div>
          </div>
        </section>

        <section id="a-s02" class="clip shot" data-start="3" data-duration="4.999" data-track-index="1">
          <div class="shot-inner">
            <div class="visual"><img class="board q2" src="assets/storyboards/PV01-导演分镜板-A-S01至S04-城市入口与世界建立-v01.png" alt="零点门缝" /></div>
            <div class="grade"></div><div class="vignette"></div><div class="grain"></div>
            <div class="meta"><span><strong>PV01 / S02</strong> · 00:03:00</span><span class="lens">28MM · SLOW PUSH<br />ENTRY / 00:17</span></div>
            <div class="caption"><div class="caption-panel"><span class="speaker">A / DAILY · VOICE OVER</span><p class="dialogue">近未来的城市，记忆可以被保存。</p></div></div>
          </div>
        </section>

        <section id="a-s03" class="clip shot" data-start="8" data-duration="4.999" data-track-index="1">
          <div class="shot-inner">
            <div class="visual"><img class="board q3" src="assets/storyboards/PV01-导演分镜板-A-S01至S04-城市入口与世界建立-v01.png" alt="零点回声酒馆内部" /></div>
            <div class="grade"></div><div class="vignette"></div><div class="grain"></div>
            <div class="meta"><span><strong>PV01 / S03</strong> · 00:08:00</span><span class="lens">28MM · DOLLY RIGHT<br />NINE SEATS / INTERIOR</span></div>
            <div class="caption"><div class="caption-panel"><span class="speaker">A / DAILY · VOICE OVER</span><p class="dialogue">可人最擅长的，偏偏是骗自己。</p></div></div>
          </div>
        </section>

        <section id="a-s04" class="clip shot" data-start="13" data-duration="4.999" data-track-index="1">
          <div class="shot-inner">
            <div class="visual"><img class="board q4" src="assets/storyboards/PV01-导演分镜板-A-S01至S04-城市入口与世界建立-v01.png" alt="记忆杯微距" /></div>
            <div class="grade"></div><div class="vignette"></div><div class="grain"></div>
            <div class="meta"><span><strong>PV01 / S04</strong> · 00:13:00</span><span class="lens">90MM · INSERT<br />MEMORY GLASS / ACTIVE</span></div>
            <div class="caption"><div class="caption-panel"><span class="speaker">A / DAILY · VOICE OVER</span><p class="dialogue">零点以后，有一扇门，<br />只为情绪失控的人打开。</p></div></div>
          </div>
        </section>

        <div class="frame-line"></div>
        <div class="progress"><div id="phase-progress" class="progress-fill"></div></div>
        <div class="phase-tag">PHASE A / ENTRY</div>
        <div id="ink" class="ink"></div>
      </div>

      <script>
        window.__timelines = window.__timelines || {};
        const tl = gsap.timeline({ paused: true });
        tl.fromTo("#phase-progress", { width: "0%" }, { width: "100%", duration: 18, ease: "none" }, 0);
        tl.fromTo("#a-s01 .visual", { scale: 1.015, x: 0, y: 0 }, { scale: 1.065, x: -20, y: -7, duration: 3, ease: "sine.inOut" }, 0);
        tl.fromTo("#a-s02 .visual", { scale: 1.01, x: 0 }, { scale: 1.075, x: -8, duration: 5, ease: "power1.inOut" }, 3);
        tl.fromTo("#a-s03 .visual", { scale: 1.045, x: -24 }, { scale: 1.045, x: 26, duration: 5, ease: "sine.inOut" }, 8);
        tl.fromTo("#a-s04 .visual", { scale: 1.02 }, { scale: 1.08, duration: 5, ease: "power1.inOut" }, 13);
        [["#a-s01",0],["#a-s02",3],["#a-s03",8],["#a-s04",13]].forEach(([id,t]) => {
          tl.fromTo(id + " .meta", { opacity: 0, y: -12 }, { opacity: 1, y: 0, duration: .42, ease: "power1.out" }, t + .12);
        });
        tl.fromTo(".caption-panel", { opacity: 0, y: 17 }, { opacity: 1, y: 0, duration: .48, stagger: 5, ease: "power1.out" }, 3.28);
        [7.84].forEach((t) => {
          tl.fromTo("#ink", { opacity: 0 }, { opacity: .78, duration: .14, ease: "power1.in" }, t);
          tl.to("#ink", { opacity: 0, duration: .15, ease: "power1.out" }, t + .14);
        });
        window.__timelines["phase-a"] = tl;
      </script>
    </template>
  </body>
</html>
