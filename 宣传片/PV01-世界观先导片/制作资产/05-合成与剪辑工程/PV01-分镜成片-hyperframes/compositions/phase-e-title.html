<!doctype html>
<html lang="zh-CN">
  <head><meta charset="UTF-8" /></head>
  <body>
    <template>
      <style>
        @font-face { font-family: "PV Sans SC"; src: url("assets/fonts/NotoSansCJKsc-Regular.otf") format("opentype"); font-weight: 400; }
        @font-face { font-family: "PV Serif SC"; src: url("assets/fonts/NotoSerifCJKsc-Bold.otf") format("opentype"); font-weight: 700; }
        #root { position: absolute; inset: 0; width: 1920px; height: 1080px; overflow: hidden; background: #211b19; color: #d5cdc1; }
        .mineral { position: absolute; inset: 0; opacity: .12; background-image: repeating-radial-gradient(circle at 23% 19%, rgba(213,205,193,.16) 0 1px, transparent 1px 5px); background-size: 11px 11px; mix-blend-mode: soft-light; }
        .edge { position: absolute; inset: 42px; border: 1px solid rgba(141,116,66,.08); }
        .edge::before { content: ""; position: absolute; left: 0; top: 0; width: 88px; height: 1px; background: rgba(141,116,66,.48); }
        .light-beam { position: absolute; left: -250px; top: -380px; width: 1320px; height: 1220px; opacity: 0; transform: rotate(-13deg); transform-origin: 0 0; background: radial-gradient(ellipse at 34% 28%, rgba(255,219,158,.34) 0%, rgba(185,121,58,.15) 26%, rgba(185,121,58,.045) 48%, transparent 70%); mix-blend-mode: screen; filter: blur(8px); }
        .dust { position: absolute; left: 190px; top: 120px; width: 1060px; height: 650px; opacity: 0; background-image: radial-gradient(circle at 15% 33%, rgba(213,205,193,.42) 0 1px, transparent 2px), radial-gradient(circle at 47% 61%, rgba(213,205,193,.25) 0 1px, transparent 2px), radial-gradient(circle at 78% 24%, rgba(185,121,58,.35) 0 1px, transparent 2px); background-size: 127px 113px, 173px 151px, 211px 179px; }
        .lockup { position: absolute; left: 258px; top: 388px; width: 1420px; height: 360px; }
        .title-stack { position: absolute; left: 0; top: 0; width: 100%; height: 170px; opacity: 0; overflow: hidden; }
        .title-layer { position: absolute; left: 0; top: 0; font: 700 118px/1.12 "PV Serif SC", serif; letter-spacing: .16em; white-space: nowrap; }
        .depth-1 { color: #332a20; transform: translate(8px, 8px); }
        .depth-2 { color: #4a3b27; transform: translate(6px, 6px); }
        .depth-3 { color: #655034; transform: translate(4px, 4px); }
        .depth-4 { color: #8d7442; transform: translate(2px, 2px); }
        .title-face { color: #d5cdc1; text-shadow: 0 0 22px rgba(185,121,58,.12); }
        .hairline { position: absolute; left: 5px; top: 166px; width: 0; height: 1px; background: #8d7442; box-shadow: 0 0 10px rgba(185,121,58,.35); }
        .subtitle { position: absolute; left: 7px; top: 222px; opacity: 0; font: 400 37px/1.25 "PV Sans SC", sans-serif; letter-spacing: .34em; color: #b7aa98; }
        .subtitle-mark { display: inline-block; width: 34px; height: 1px; margin: 0 20px 11px 0; background: #77283a; }
        .corner-code { position: absolute; right: 82px; bottom: 62px; opacity: 0; font: 400 14px/1.3 "SFMono-Regular", monospace; letter-spacing: .22em; color: rgba(141,116,66,.42); }
      </style>

      <div id="root" data-composition-id="phase-e-title" data-width="1920" data-height="1080" data-duration="4">
        <div class="mineral"></div><div class="edge"></div><div id="light-beam" class="light-beam"></div><div id="dust" class="dust"></div>
        <div class="lockup">
          <div id="title-stack" class="title-stack">
            <div class="title-layer depth-1">零号回声酒馆</div>
            <div class="title-layer depth-2">零号回声酒馆</div>
            <div class="title-layer depth-3">零号回声酒馆</div>
            <div class="title-layer depth-4">零号回声酒馆</div>
            <div class="title-layer title-face">零号回声酒馆</div>
          </div>
          <div id="hairline" class="hairline"></div>
          <div id="subtitle" class="subtitle"><span class="subtitle-mark"></span>敬请期待</div>
        </div>
        <div id="corner-code" class="corner-code">ZERO ECHO / PV01</div>
      </div>

      <script>
        window.__timelines = window.__timelines || {};
        const tl = gsap.timeline({ paused: true });
        tl.fromTo("#light-beam", { opacity: 0, x: -70, y: -20 }, { opacity: .9, x: 90, y: 40, duration: 1.03, ease: "power2.out" }, .42);
        tl.fromTo("#title-stack", { opacity: 0, clipPath: "inset(0 100% 0 0)" }, { opacity: 1, clipPath: "inset(0 0% 0 0)", duration: .88, ease: "power2.out" }, .54);
        tl.to("#hairline", { width: 740, duration: .72, ease: "power2.out" }, .82);
        tl.fromTo("#dust", { opacity: 0, x: -12 }, { opacity: .2, x: 10, duration: 1.2, ease: "sine.out" }, .58);
        tl.fromTo("#subtitle", { opacity: 0, y: 12 }, { opacity: 1, y: 0, duration: .65, ease: "power2.out" }, 1.60);
        tl.fromTo("#corner-code", { opacity: 0 }, { opacity: .52, duration: .55, ease: "sine.out" }, 1.88);
        tl.to("#light-beam", { opacity: .58, duration: .62, ease: "sine.inOut" }, 2.25);
        tl.to("#dust", { opacity: .12, x: 22, duration: 1.35, ease: "none" }, 2.25);
        window.__timelines["phase-e-title"] = tl;
      </script>
    </template>
  </body>
</html>
