<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080">
    <defs>
      <radialGradient id="glow" cx="18%" cy="0%" r="78%"><stop offset="0%" stop-color="#58dfc1" stop-opacity="0.16"/><stop offset="100%" stop-color="#07090c" stop-opacity="0"/></radialGradient>
      <filter id="shadow"><feDropShadow dx="0" dy="12" stdDeviation="18" flood-color="#000" flood-opacity="0.42"/></filter>
    </defs>
    <rect width="1920" height="1080" fill="#07090c"/>
    <rect width="1920" height="1080" fill="url(#glow)"/>
    <rect x="42" y="36" width="10" height="76" rx="5" fill="#58dfc1"/>
    <text x="78" y="76" fill="#eef4f2" font-size="42" font-weight="800" font-family="PingFang SC, Noto Sans CJK SC, sans-serif">03｜四幕14镜＋片尾时间轴</text>
    <text x="80" y="108" fill="#9aa7aa" font-size="21" font-family="PingFang SC, Noto Sans CJK SC, sans-serif">A 旧城与入口 → B 安全表面被撕开 → C 疯癫毒舌峰值 → D 静止蔑视 → 4秒品牌余韵</text>
    <g filter="url(#shadow)"><g>
    <rect x="48" y="145" width="344" height="255" rx="22" fill="#11161c" stroke="#77818c" stroke-width="3"/>
    <rect x="48" y="145" width="344" height="58" rx="22" fill="#77818c" opacity="0.16"/>
    <text x="72" y="184" fill="#77818c" font-size="28" font-weight="700" font-family="PingFang SC, Noto Sans CJK SC, sans-serif">S01｜00:00—00:03</text>
    
    <text x="72" y="237" fill="#eef4f2" font-size="18" font-weight="400" font-family="PingFang SC, Noto Sans CJK SC, sans-serif">WK02旧城世界先出现；无酒馆门、</text><text x="72" y="263.1" fill="#eef4f2" font-size="18" font-weight="400" font-family="PingFang SC, Noto Sans CJK SC, sans-serif">招牌与文字。</text><text x="72" y="289.2" fill="#eef4f2" font-size="18" font-weight="400" font-family="PingFang SC, Noto Sans CJK SC, sans-serif">24mm低机位｜列车左→右冷扫。</text>
  </g><g>
    <rect x="412" y="145" width="344" height="255" rx="22" fill="#11161c" stroke="#d28a3d" stroke-width="3"/>
    <rect x="412" y="145" width="344" height="58" rx="22" fill="#d28a3d" opacity="0.16"/>
    <text x="436" y="184" fill="#d28a3d" font-size="28" font-weight="700" font-family="PingFang SC, Noto Sans CJK SC, sans-serif">S02｜00:03—00:08</text>
    
    <text x="436" y="237" fill="#eef4f2" font-size="18" font-weight="400" font-family="PingFang SC, Noto Sans CJK SC, sans-serif">Take02改编为入口源片；末尾门开10—</text><text x="436" y="263.1" fill="#eef4f2" font-size="18" font-weight="400" font-family="PingFang SC, Noto Sans CJK SC, sans-serif">15cm并以门板遮挡。</text><text x="436" y="289.2" fill="#eef4f2" font-size="18" font-weight="400" font-family="PingFang SC, Noto Sans CJK SC, sans-serif">VO：记忆可以被保存。</text>
  </g><g>
    <rect x="776" y="145" width="344" height="255" rx="22" fill="#11161c" stroke="#77818c" stroke-width="3"/>
    <rect x="776" y="145" width="344" height="58" rx="22" fill="#77818c" opacity="0.16"/>
    <text x="800" y="184" fill="#77818c" font-size="28" font-weight="700" font-family="PingFang SC, Noto Sans CJK SC, sans-serif">S03｜00:08—00:13</text>
    
    <text x="800" y="237" fill="#eef4f2" font-size="18" font-weight="400" font-family="PingFang SC, Noto Sans CJK SC, sans-serif">推门入酒馆；九席、第七号位、零号空椅建立。</text><text x="800" y="263.1" fill="#eef4f2" font-size="18" font-weight="400" font-family="PingFang SC, Noto Sans CJK SC, sans-serif">28mm低速滑行。</text>
  </g><g>
    <rect x="1140" y="145" width="344" height="255" rx="22" fill="#11161c" stroke="#77818c" stroke-width="3"/>
    <rect x="1140" y="145" width="344" height="58" rx="22" fill="#77818c" opacity="0.16"/>
    <text x="1164" y="184" fill="#77818c" font-size="28" font-weight="700" font-family="PingFang SC, Noto Sans CJK SC, sans-serif">S04｜00:13—00:18</text>
    
    <text x="1164" y="237" fill="#eef4f2" font-size="18" font-weight="400" font-family="PingFang SC, Noto Sans CJK SC, sans-serif">圆钟／黑门／记忆杯三件短组接。</text><text x="1164" y="263.1" fill="#eef4f2" font-size="18" font-weight="400" font-family="PingFang SC, Noto Sans CJK SC, sans-serif">故障青只在杯底。</text>
  </g><g>
    <rect x="1504" y="145" width="344" height="255" rx="22" fill="#11161c" stroke="#d7aa63" stroke-width="3"/>
    <rect x="1504" y="145" width="344" height="58" rx="22" fill="#d7aa63" opacity="0.16"/>
    <text x="1528" y="184" fill="#d7aa63" font-size="28" font-weight="700" font-family="PingFang SC, Noto Sans CJK SC, sans-serif">S05｜00:18—00:23</text>
    
    <text x="1528" y="237" fill="#eef4f2" font-size="18" font-weight="400" font-family="PingFang SC, Noto Sans CJK SC, sans-serif">日常小铭擦杯，停半拍抬眼。</text><text x="1528" y="263.1" fill="#eef4f2" font-size="18" font-weight="400" font-family="PingFang SC, Noto Sans CJK SC, sans-serif">“欢迎。这里不卖遗忘。”</text>
  </g><g>
    <rect x="48" y="420" width="344" height="255" rx="22" fill="#11161c" stroke="#d7aa63" stroke-width="3"/>
    <rect x="48" y="420" width="344" height="58" rx="22" fill="#d7aa63" opacity="0.16"/>
    <text x="72" y="459" fill="#d7aa63" font-size="28" font-weight="700" font-family="PingFang SC, Noto Sans CJK SC, sans-serif">S06｜00:23—00:28</text>
    
    <text x="72" y="512" fill="#eef4f2" font-size="18" font-weight="400" font-family="PingFang SC, Noto Sans CJK SC, sans-serif">65mm放杯到第七号位，焦点由杯沿到眼睛。</text><text x="72" y="538.1" fill="#eef4f2" font-size="18" font-weight="400" font-family="PingFang SC, Noto Sans CJK SC, sans-serif">“你点的，不是酒。”</text>
  </g><g>
    <rect x="412" y="420" width="344" height="255" rx="22" fill="#11161c" stroke="#bd4a49" stroke-width="3"/>
    <rect x="412" y="420" width="344" height="58" rx="22" fill="#bd4a49" opacity="0.16"/>
    <text x="436" y="459" fill="#bd4a49" font-size="28" font-weight="700" font-family="PingFang SC, Noto Sans CJK SC, sans-serif">S07｜00:28—00:32</text>
    
    <text x="436" y="512" fill="#eef4f2" font-size="18" font-weight="400" font-family="PingFang SC, Noto Sans CJK SC, sans-serif">F01开场中性、句中歪头、最后6帧回中性。</text><text x="436" y="538.1" fill="#eef4f2" font-size="18" font-weight="400" font-family="PingFang SC, Noto Sans CJK SC, sans-serif">“酒哪有秘密好喝？”</text>
  </g><g>
    <rect x="776" y="420" width="344" height="255" rx="22" fill="#11161c" stroke="#d7aa63" stroke-width="3"/>
    <rect x="776" y="420" width="344" height="58" rx="22" fill="#d7aa63" opacity="0.16"/>
    <text x="800" y="459" fill="#d7aa63" font-size="28" font-weight="700" font-family="PingFang SC, Noto Sans CJK SC, sans-serif">S08｜00:32—00:36</text>
    
    <text x="800" y="512" fill="#eef4f2" font-size="18" font-weight="400" font-family="PingFang SC, Noto Sans CJK SC, sans-serif">目光句中右偏4°，最后6帧回镜头。</text><text x="800" y="538.1" fill="#eef4f2" font-size="18" font-weight="400" font-family="PingFang SC, Noto Sans CJK SC, sans-serif">“第一遍，看你记得的。”</text>
  </g><g>
    <rect x="1140" y="420" width="344" height="255" rx="22" fill="#11161c" stroke="#bd4a49" stroke-width="3"/>
    <rect x="1140" y="420" width="344" height="58" rx="22" fill="#bd4a49" opacity="0.16"/>
    <text x="1164" y="459" fill="#bd4a49" font-size="28" font-weight="700" font-family="PingFang SC, Noto Sans CJK SC, sans-serif">S09｜00:36—00:41</text>
    
    <text x="1164" y="512" fill="#eef4f2" font-size="18" font-weight="400" font-family="PingFang SC, Noto Sans CJK SC, sans-serif">冷光切F02；快—停—快，一次短哈。</text><text x="1164" y="538.1" fill="#eef4f2" font-size="18" font-weight="400" font-family="PingFang SC, Noto Sans CJK SC, sans-serif">“看你故意漏掉的。”</text>
  </g><g>
    <rect x="1504" y="420" width="344" height="255" rx="22" fill="#11161c" stroke="#d7aa63" stroke-width="3"/>
    <rect x="1504" y="420" width="344" height="58" rx="22" fill="#d7aa63" opacity="0.16"/>
    <text x="1528" y="459" fill="#d7aa63" font-size="28" font-weight="700" font-family="PingFang SC, Noto Sans CJK SC, sans-serif">S10｜00:41—00:45</text>
    
    <text x="1528" y="512" fill="#eef4f2" font-size="18" font-weight="400" font-family="PingFang SC, Noto Sans CJK SC, sans-serif">日常留余地；44.28后进入23帧明暗红人</text><text x="1528" y="538.1" fill="#eef4f2" font-size="18" font-weight="400" font-family="PingFang SC, Noto Sans CJK SC, sans-serif">格夺权。</text><text x="1528" y="564.2" fill="#eef4f2" font-size="18" font-weight="400" font-family="PingFang SC, Noto Sans CJK SC, sans-serif">后景狞笑在红光前J-cut。</text>
  </g><g>
    <rect x="48" y="695" width="344" height="255" rx="22" fill="#11161c" stroke="#bd4a49" stroke-width="3"/>
    <rect x="48" y="695" width="344" height="58" rx="22" fill="#bd4a49" opacity="0.16"/>
    <text x="72" y="734" fill="#bd4a49" font-size="28" font-weight="700" font-family="PingFang SC, Noto Sans CJK SC, sans-serif">S11｜00:45—00:50</text>
    
    <text x="72" y="787" fill="#eef4f2" font-size="18" font-weight="400" font-family="PingFang SC, Noto Sans CJK SC, sans-serif">F03贴近半步，65→85mm一次轻推。</text><text x="72" y="813.1" fill="#eef4f2" font-size="18" font-weight="400" font-family="PingFang SC, Noto Sans CJK SC, sans-serif">“怯懦，改名叫体面。”</text>
  </g><g>
    <rect x="412" y="695" width="344" height="255" rx="22" fill="#11161c" stroke="#d7aa63" stroke-width="3"/>
    <rect x="412" y="695" width="344" height="58" rx="22" fill="#d7aa63" opacity="0.16"/>
    <text x="436" y="734" fill="#d7aa63" font-size="28" font-weight="700" font-family="PingFang SC, Noto Sans CJK SC, sans-serif">S12｜00:50—00:53</text>
    
    <text x="436" y="787" fill="#eef4f2" font-size="18" font-weight="400" font-family="PingFang SC, Noto Sans CJK SC, sans-serif">日常85mm绝对锁定。</text><text x="436" y="813.1" fill="#eef4f2" font-size="18" font-weight="400" font-family="PingFang SC, Noto Sans CJK SC, sans-serif">“我不替你忘记。”</text>
  </g><g>
    <rect x="776" y="695" width="344" height="255" rx="22" fill="#11161c" stroke="#b9a16a" stroke-width="3"/>
    <rect x="776" y="695" width="344" height="58" rx="22" fill="#b9a16a" opacity="0.16"/>
    <text x="800" y="734" fill="#b9a16a" font-size="28" font-weight="700" font-family="PingFang SC, Noto Sans CJK SC, sans-serif">S13｜00:53—00:57</text>
    
    <text x="800" y="787" fill="#eef4f2" font-size="18" font-weight="400" font-family="PingFang SC, Noto Sans CJK SC, sans-serif">无闪硬切F04；与S14为同一连续7秒源片</text><text x="800" y="813.1" fill="#eef4f2" font-size="18" font-weight="400" font-family="PingFang SC, Noto Sans CJK SC, sans-serif">。</text><text x="800" y="839.2" fill="#eef4f2" font-size="18" font-weight="400" font-family="PingFang SC, Noto Sans CJK SC, sans-serif">“我负责拆穿你。”</text>
  </g><g>
    <rect x="1140" y="695" width="344" height="255" rx="22" fill="#11161c" stroke="#b9a16a" stroke-width="3"/>
    <rect x="1140" y="695" width="344" height="58" rx="22" fill="#b9a16a" opacity="0.16"/>
    <text x="1164" y="734" fill="#b9a16a" font-size="28" font-weight="700" font-family="PingFang SC, Noto Sans CJK SC, sans-serif">S14｜00:57—01:00</text>
    
    <text x="1164" y="787" fill="#eef4f2" font-size="18" font-weight="400" font-family="PingFang SC, Noto Sans CJK SC, sans-serif">57秒无可见切点；F04说完停0.8秒。</text><text x="1164" y="813.1" fill="#eef4f2" font-size="18" font-weight="400" font-family="PingFang SC, Noto Sans CJK SC, sans-serif">“零点回声酒馆。敢看吗？”</text>
  </g><g>
    <rect x="1504" y="695" width="344" height="255" rx="22" fill="#11161c" stroke="#b9a16a" stroke-width="3"/>
    <rect x="1504" y="695" width="344" height="58" rx="22" fill="#b9a16a" opacity="0.16"/>
    <text x="1528" y="734" fill="#b9a16a" font-size="28" font-weight="700" font-family="PingFang SC, Noto Sans CJK SC, sans-serif">END｜01:00—01:04</text>
    
    <text x="1528" y="787" fill="#eef4f2" font-size="18" font-weight="400" font-family="PingFang SC, Noto Sans CJK SC, sans-serif">硬切烟木黑；左上琥珀光先显片名、</text><text x="1528" y="813.1" fill="#eef4f2" font-size="18" font-weight="400" font-family="PingFang SC, Noto Sans CJK SC, sans-serif">后显“敬请期待”。</text><text x="1528" y="839.2" fill="#eef4f2" font-size="18" font-weight="400" font-family="PingFang SC, Noto Sans CJK SC, sans-serif">本地后期，不占Seedance任务。</text>
  </g></g>
    <line x1="48" y1="1030" x2="1872" y2="1030" stroke="#263039" stroke-width="2"/>
    <text x="48" y="1061" fill="#9aa7aa" font-size="18" font-family="PingFang SC, Noto Sans CJK SC, sans-serif">ZERO-ECHO-PV01｜RunningHub导演作战墙｜v02锁片｜本地已同步／画布待替换</text>
  </svg>