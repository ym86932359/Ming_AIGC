<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080">
    <defs>
      <radialGradient id="glow" cx="18%" cy="0%" r="78%"><stop offset="0%" stop-color="#58dfc1" stop-opacity="0.16"/><stop offset="100%" stop-color="#07090c" stop-opacity="0"/></radialGradient>
      <filter id="shadow"><feDropShadow dx="0" dy="12" stdDeviation="18" flood-color="#000" flood-opacity="0.42"/></filter>
    </defs>
    <rect width="1920" height="1080" fill="#07090c"/>
    <rect width="1920" height="1080" fill="url(#glow)"/>
    <rect x="42" y="36" width="10" height="76" rx="5" fill="#58dfc1"/>
    <text x="78" y="76" fill="#eef4f2" font-size="42" font-weight="800" font-family="PingFang SC, Noto Sans CJK SC, sans-serif">08｜声音、灯光与VFX合同</text>
    <text x="80" y="108" fill="#9aa7aa" font-size="21" font-family="PingFang SC, Noto Sans CJK SC, sans-serif">三声线来自同一身份；疯癫到蔑视的骤停是全片最强节奏断点</text>
    <g filter="url(#shadow)"><g>
    <rect x="48" y="150" width="586" height="350" rx="22" fill="#11161c" stroke="#d7aa63" stroke-width="3"/>
    <rect x="48" y="150" width="586" height="58" rx="22" fill="#d7aa63" opacity="0.16"/>
    <text x="72" y="189" fill="#d7aa63" font-size="28" font-weight="700" font-family="PingFang SC, Noto Sans CJK SC, sans-serif">日常声线</text>
    
    <text x="72" y="242" fill="#eef4f2" font-size="21" font-weight="400" font-family="PingFang SC, Noto Sans CJK SC, sans-serif">本人声底，中低音、干、近讲。</text><text x="72" y="272.45" fill="#eef4f2" font-size="21" font-weight="400" font-family="PingFang SC, Noto Sans CJK SC, sans-serif">3.5—4字/秒；自然呼吸；轻木质早反射。</text><text x="72" y="302.9" fill="#eef4f2" font-size="21" font-weight="400" font-family="PingFang SC, Noto Sans CJK SC, sans-serif">对应VO01—05、07、09、11。</text>
  </g><g>
    <rect x="656" y="150" width="586" height="350" rx="22" fill="#11161c" stroke="#bd4a49" stroke-width="3"/>
    <rect x="656" y="150" width="586" height="58" rx="22" fill="#bd4a49" opacity="0.16"/>
    <text x="680" y="189" fill="#bd4a49" font-size="28" font-weight="700" font-family="PingFang SC, Noto Sans CJK SC, sans-serif">疯癫声线</text>
    
    <text x="680" y="242" fill="#eef4f2" font-size="21" font-weight="400" font-family="PingFang SC, Noto Sans CJK SC, sans-serif">同一声底低移1—1.5半音。</text><text x="680" y="272.45" fill="#eef4f2" font-size="21" font-weight="400" font-family="PingFang SC, Noto Sans CJK SC, sans-serif">4—4.5字/秒，快—停—快；耳语8%—12%，</text><text x="680" y="302.9" fill="#eef4f2" font-size="21" font-weight="400" font-family="PingFang SC, Noto Sans CJK SC, sans-serif">25—35ms。</text><text x="680" y="333.35" fill="#eef4f2" font-size="21" font-weight="400" font-family="PingFang SC, Noto Sans CJK SC, sans-serif">仅一次短“哈”；禁止怪兽音。</text>
  </g><g>
    <rect x="1264" y="150" width="586" height="350" rx="22" fill="#11161c" stroke="#b9a16a" stroke-width="3"/>
    <rect x="1264" y="150" width="586" height="58" rx="22" fill="#b9a16a" opacity="0.16"/>
    <text x="1288" y="189" fill="#b9a16a" font-size="28" font-weight="700" font-family="PingFang SC, Noto Sans CJK SC, sans-serif">蔑视声线</text>
    
    <text x="1288" y="242" fill="#eef4f2" font-size="21" font-weight="400" font-family="PingFang SC, Noto Sans CJK SC, sans-serif">同一声底低移约2半音。</text><text x="1288" y="272.45" fill="#eef4f2" font-size="21" font-weight="400" font-family="PingFang SC, Noto Sans CJK SC, sans-serif">3—3.5字/秒；低、慢、干；耳语低于3%；主声中央。</text><text x="1288" y="302.9" fill="#eef4f2" font-size="21" font-weight="400" font-family="PingFang SC, Noto Sans CJK SC, sans-serif">禁止咆哮、拖腔和表演式发疯。</text>
  </g><g>
    <rect x="48" y="522" width="586" height="350" rx="22" fill="#11161c" stroke="#d7aa63" stroke-width="3"/>
    <rect x="48" y="522" width="586" height="58" rx="22" fill="#d7aa63" opacity="0.16"/>
    <text x="72" y="561" fill="#d7aa63" font-size="28" font-weight="700" font-family="PingFang SC, Noto Sans CJK SC, sans-serif">日常灯光</text>
    
    <text x="72" y="614" fill="#eef4f2" font-size="21" font-weight="400" font-family="PingFang SC, Noto Sans CJK SC, sans-serif">2700—2900K实景灯；左前4300K柔主光；</text><text x="72" y="644.45" fill="#eef4f2" font-size="21" font-weight="400" font-family="PingFang SC, Noto Sans CJK SC, sans-serif">右前5000K辅光；左后7000K轮廓30%—35%。</text><text x="72" y="674.9" fill="#eef4f2" font-size="21" font-weight="400" font-family="PingFang SC, Noto Sans CJK SC, sans-serif">肤色58—64 IRE。</text>
  </g><g>
    <rect x="656" y="522" width="586" height="350" rx="22" fill="#11161c" stroke="#bd4a49" stroke-width="3"/>
    <rect x="656" y="522" width="586" height="58" rx="22" fill="#bd4a49" opacity="0.16"/>
    <text x="680" y="561" fill="#bd4a49" font-size="28" font-weight="700" font-family="PingFang SC, Noto Sans CJK SC, sans-serif">疯癫／蔑视灯光</text>
    
    <text x="680" y="614" fill="#eef4f2" font-size="21" font-weight="400" font-family="PingFang SC, Noto Sans CJK SC, sans-serif">疯癫：琥珀降1档，4000K窄侧光，7200K轮廓45%，</text><text x="680" y="644.45" fill="#eef4f2" font-size="21" font-weight="400" font-family="PingFang SC, Noto Sans CJK SC, sans-serif">暗朱砂&lt;5%。</text><text x="680" y="674.9" fill="#eef4f2" font-size="21" font-weight="400" font-family="PingFang SC, Noto Sans CJK SC, sans-serif">蔑视：闪动停止，4100K窄柔光，背景暗半档。</text>
  </g><g>
    <rect x="1264" y="522" width="586" height="350" rx="22" fill="#11161c" stroke="#8b72d9" stroke-width="3"/>
    <rect x="1264" y="522" width="586" height="58" rx="22" fill="#8b72d9" opacity="0.16"/>
    <text x="1288" y="561" fill="#8b72d9" font-size="28" font-weight="700" font-family="PingFang SC, Noto Sans CJK SC, sans-serif">VFX与SFX</text>
    
    <text x="1288" y="614" fill="#eef4f2" font-size="21" font-weight="400" font-family="PingFang SC, Noto Sans CJK SC, sans-serif">S10→S11唯一23帧人格夺权：明4f／暗3f／明3f／</text><text x="1288" y="644.45" fill="#eef4f2" font-size="21" font-weight="400" font-family="PingFang SC, Noto Sans CJK SC, sans-serif">暗3f／红3f／近黑2f／完整小丑5f；红闪只叠小丑脸，</text><text x="1288" y="674.9" fill="#eef4f2" font-size="21" font-weight="400" font-family="PingFang SC, Noto Sans CJK SC, sans-serif">背景最大12px失焦。</text><text x="1288" y="705.35" fill="#eef4f2" font-size="21" font-weight="400" font-family="PingFang SC, Noto Sans CJK SC, sans-serif">后景狞笑在红光前J-cut；S12→S13无闪硬切。</text><text x="1288" y="735.8" fill="#eef4f2" font-size="21" font-weight="400" font-family="PingFang SC, Noto Sans CJK SC, sans-serif">片尾另用左上暖光揭字声。</text>
  </g></g>
    <line x1="48" y1="1030" x2="1872" y2="1030" stroke="#263039" stroke-width="2"/>
    <text x="48" y="1061" fill="#9aa7aa" font-size="18" font-family="PingFang SC, Noto Sans CJK SC, sans-serif">ZERO-ECHO-PV01｜RunningHub导演作战墙｜v02锁片｜本地已同步／画布待替换</text>
  </svg>